dependencies:
  - OpenZeppelin/openzeppelin-contracts@5.0.2

compiler:
  solc:
    version: 0.8.24
    remappings:
      - "@openzeppelin/contracts=OpenZeppelin/openzeppelin-contracts@5.0.2/contracts"
      - "@smartcontractkit/contracts=smartcontractkit/chainlink-brownie-contracts@1.3.0/contracts"
      # smartcontractkit/chainlink-brownie-contracts@1.3.0/contracts/src/v0.8/functions/v1_3_0/Libraries/

networks:
  default: eth-mainnet-fork